spring:

  ai:
    mcp:
      client:
        enabled: true
        name: embabel
        version: 1.0.0
        request-timeout: 30s
        type: SYNC

        stdio:
          connections:
            brave-search-mcp:
              command: docker
              args:
                - run
                - -i
                - --rm
                - -e
                - BRAVE_MCP_TRANSPORT
                - -e
                - BRAVE_API_KEY
                - mcp/brave-search
              env:
                BRAVE_MCP_TRANSPORT: "stdio"
                BRAVE_API_KEY: ${BRAVE_API_KEY}
            fetch-mcp:
              command: docker
              args:
                - run
                - -i
                - --rm
                - mcp/fetch
            puppeteer-mcp:
              command: docker
              args:
                - run
                - -i
                - --rm
                - -e
                - DOCKER_CONTAINER
                - mcp/puppeteer
              env:
                DOCKER_CONTAINER: true
